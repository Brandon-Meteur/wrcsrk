  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --dust: #b88365;
      --dust-light: #c4a182;
      --nav-height: 72px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: sticky;
      top: 0;
      height: var(--nav-height);
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 2rem;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,169,110,0.15);
    }

    .nav-logo a {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-logo a:hover { opacity: 0.8; }
    .nav-logo img {
      height: 150px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .nav-links { display: flex; gap: 0.25rem; list-style: none; }
    .nav-links a {
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      padding: 0.5rem 1rem;
      position: relative;
      transition: color 0.2s;
    }
    .nav-links a.active { color: var(--dust); }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; right: 50%;
      height: 2px;
      background: var(--dust);
      transition: left 0.25s, right 0.25s;
    }
    .nav-links a.active::after,
    .nav-links a:hover::after { left: 1rem; right: 1rem; }
    .nav-links a:hover { color: var(--white); }

    .nav-social {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
    }
    .nav-social a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s, transform 0.2s;
      display: flex; align-items: center;
    }
    .nav-social a:hover { color: var(--white); transform: translateY(-2px); }
    .nav-social svg { width: 18px; height: 18px; fill: currentColor; }

    /* ─── PAGE HEADER ─── */
    .page-header {
      text-align: center;
      padding: 4rem 2rem 2rem;
    }
    .page-header .eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dust);
      margin-bottom: 0.75rem;
    }
    .page-header h1 {
      font-family: 'Racing Sans One', sans-serif;
      font-size: clamp(4rem, 8vw, 8rem);
      letter-spacing: 0.06em;
      line-height: 1;
      color: var(--white);
    }


    /* ─── MASONRY GALLERY ─── */
    .gallery-container {
      padding: 3rem 1.5rem 5rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .masonry-grid {
      columns: 3;
      column-gap: 12px;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border-radius: 2px;
    }

    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease, filter 0.4s ease;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      -moz-user-select: none;
    }

    .masonry-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(200,169,110,0.0);
      transition: background 0.3s;
      pointer-events: none;
    }

    .masonry-item:hover img {
      transform: scale(1.04);
      filter: brightness(0.85);
    }

    .masonry-item:hover::after {
      background: rgba(200,169,110,0.06);
    }

    .masonry-item .zoom-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 40px;
      height: 40px;
      background: rgba(10,10,10,0.75);
      border: 1px solid rgba(200,169,110,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 2;
      backdrop-filter: blur(4px);
    }

    .masonry-item:hover .zoom-icon {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    .masonry-item .zoom-icon svg {
      width: 16px; height: 16px; fill: var(--dust-light);
    }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-inner {
      position: relative;
      max-width: 92vw;
      max-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      display: block;
      border-radius: 2px;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      -moz-user-select: none;
      transform: scale(0.96);
      transition: transform 0.3s ease;
    }

    .lightbox.open .lightbox-img { transform: scale(1); }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 44px; height: 44px;
      background: rgba(10,10,10,0.8);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }
    .lightbox-close:hover { background: rgba(200,169,110,0.15); transform: rotate(90deg); }
    .lightbox-close svg { width: 18px; height: 18px; fill: var(--white); }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px; height: 64px;
      background: rgba(10,10,10,0.7);
      border: 1px solid rgba(200,169,110,0.2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }
    .lightbox-nav:hover { background: rgba(200,169,110,0.12); }
    .lightbox-nav.prev { left: 0; border-radius: 0 4px 4px 0; }
    .lightbox-nav.next { right: 0; border-radius: 4px 0 0 4px; }
    .lightbox-nav svg { width: 20px; height: 20px; fill: var(--white); }

    .lightbox-counter {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.4);
      z-index: 1000;
    }

    /* Prevent context menu on images */
    img { -webkit-touch-callout: none; }

    /* ─── FOOTER ─── */
    footer {
      background: var(--black);
      border-top: 1px solid rgba(200,169,110,0.15);
    }
    .footer-nav {
      height: var(--nav-height);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 2rem;
    }
    .footer-logo a {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .footer-logo a:hover { opacity: 0.75; }
    .footer-logo img {
      height: 150px;
      width: auto;
      object-fit: contain;
      display: block;
    }
    .footer-links { display: flex; gap: 0.25rem; list-style: none; }
    .footer-links a {
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      padding: 0.5rem 1rem;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--dust-light); }
    .footer-links a.active { color: var(--dust); }
    .footer-social {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
    }
    .footer-social a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s, transform 0.2s;
      display: flex; align-items: center;
    }
    .footer-social a:hover { color: var(--white); transform: translateY(-2px); }
    .footer-social svg { width: 16px; height: 16px; fill: currentColor; }
    .footer-copy {
      text-align: center;
      padding: 1rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .footer-copy p {
      font-family: 'Barlow', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }

    /* ─── BACK TO TOP ─── */
    .back-to-top {
      position: fixed;
      bottom: 2rem; right: 2rem;
      width: 44px; height: 44px;
      background: rgba(10,10,10,0.85);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.2s, background 0.2s;
      z-index: 200;
      text-decoration: none;
      backdrop-filter: blur(8px);
    }
    .back-to-top.visible { opacity: 1; pointer-events: auto; }
    .back-to-top:hover { background: rgba(200,169,110,0.15); transform: translateY(-3px); }
    .back-to-top svg { width: 18px; height: 18px; fill: var(--dust-light); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1024px) {
      .masonry-grid { columns: 2; }
    }
    @media (max-width: 640px) {
      .masonry-grid { columns: 1; }
      nav, .footer-nav { grid-template-columns: 1fr auto; }
      .nav-social, .footer-social { display: none; }
      .lightbox-nav { display: none; }
    }
  </style>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Back to top
    const btt = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      window.scrollY > 300 ? btt.classList.add('visible') : btt.classList.remove('visible');
    }, { passive: true });

    // Lightbox
    const items = Array.from(document.querySelectorAll('.masonry-item'));
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCounter = document.getElementById('lbCounter');
    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      const img = items[index].querySelector('img');
      lbImg.src = img.src.replace(/w=\d+/, 'w=1600');
      lbImg.alt = img.alt;
      lbCounter.textContent = `${index + 1} / ${items.length}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + items.length) % items.length;
      const img = items[currentIndex].querySelector('img');
      lbImg.style.opacity = '0';
      setTimeout(() => {
        lbImg.src = img.src.replace(/w=\d+/, 'w=1600');
        lbImg.alt = img.alt;
        lbCounter.textContent = `${currentIndex + 1} / ${items.length}`;
        lbImg.style.opacity = '1';
      }, 150);
    }

    lbImg.style.transition = 'opacity 0.15s';

    items.forEach((item, i) => {
      item.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => navigate(-1));
    document.getElementById('lbNext').addEventListener('click', () => navigate(1));

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    // Disable right-click on images
    document.querySelectorAll('img').forEach(img => {
      img.addEventListener('contextmenu', e => e.preventDefault());
    });
  </script>
